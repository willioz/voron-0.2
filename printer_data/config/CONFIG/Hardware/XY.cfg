[stepper_x]
step_pin: PC6
dir_pin: PA14
enable_pin: !PC7
microsteps: 32
rotation_distance: 40
endstop_pin: tmc5160_stepper_x:virtual_endstop
position_endstop: 0
position_max: 120
homing_speed: 50
homing_positive_dir: false

[tmc5160 stepper_x]
cs_pin: PB12
spi_bus: spi1
diag1_pin: PG6
run_current: 0.800
stealthchop_threshold: 0

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 32
rotation_distance: 40
endstop_pin: tmc5160_stepper_y:virtual_endstop
position_endstop: 0
position_max: 120.5
homing_speed: 50
homing_positive_dir: false

[tmc5160 stepper_y]
cs_pin: PC10
spi_bus: spi1
diag1_pin: PG9
run_current: 0.800
stealthchop_threshold: 0

[autotune_tmc stepper_x]
motor: ldo-35sth48-1684ah
sgt: -20

[autotune_tmc stepper_y]
motor: ldo-35sth48-1684ah
sgt: -20