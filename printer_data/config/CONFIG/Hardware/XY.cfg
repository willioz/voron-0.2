[stepper_x]
step_pin: PC6
dir_pin: PA14
enable_pin: !PC7
microsteps: 32
full_steps_per_rotation:200
rotation_distance: 40
endstop_pin: tmc5160_stepper_x:virtual_endstop
position_endstop: 0
position_max: 120
homing_speed: 50
homing_positive_dir: false

[tmc5160 stepper_x]
cs_pin: PB12
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
sense_resistor:0.075
diag1_pin: ^!PC0
run_current: 0.800
stealthchop_threshold: 0

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 32
full_steps_per_rotation:200
rotation_distance: 40
endstop_pin: tmc5160_stepper_x:virtual_endstop
position_endstop: 0
position_max: 120
homing_speed: 50
homing_positive_dir: false

[tmc5160 stepper_y]
cs_pin: PC10
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
sense_resistor:0.075
diag1_pin: ^!PC1
run_current: 0.800
stealthchop_threshold: 0

[autotune_tmc stepper_x]
motor: ldo-35sth48-1684ah
sgt: 2

[autotune_tmc stepper_y]
motor: ldo-35sth48-1684ah
sgt: 2