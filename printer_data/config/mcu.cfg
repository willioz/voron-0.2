#------------------------------------------#
#### CUSTOM TEMPLATE MCU definition ########
#------------------------------------------#

# This template file is a pre-filled file with Klippain pins alias conventions
# that can be used if your MCU board is not yet officially supported. Just fill
# in your MCU pins and you will be good to go :)

[mcu]
##--------------------------------------------------------------------
serial: /dev/serial/by-id/change-me-to-the-correct-mcu-path
# canbus_uuid: change-me-to-the-correct-canbus-id
##--------------------------------------------------------------------

[board_pins custom_mcu]
mcu: mcu
aliases:
    X_STEP=   , X_DIR=   , X_ENABLE=   , X_TMCUART=   ,
    Y_STEP=   , Y_DIR=   , Y_ENABLE=   , Y_TMCUART=   ,

    Z_STEP=   , Z_DIR=   , Z_ENABLE=   , Z_TMCUART=   ,
    Z1_STEP=  , Z1_DIR=  , Z1_ENABLE=  , Z1_TMCUART=  ,
    Z2_STEP=  , Z2_DIR=  , Z2_ENABLE=  , Z2_TMCUART=  ,
    Z3_STEP=  , Z3_DIR=  , Z3_ENABLE=  , Z3_TMCUART=  ,

    E_STEP=   , E_DIR=   , E_ENABLE=   , E_TMCUART=   ,

    # DRIVER_SPI_MOSI= , # Used in case of SPI drivers such as TMC2240 or TMC5160
    # DRIVER_SPI_MISO= , # Used in case of SPI drivers such as TMC2240 or TMC5160
    # DRIVER_SPI_SCK=  , # Used in case of SPI drivers such as TMC2240 or TMC5160

    X_STOP= , Y_STOP= , Z_STOP= ,
    PROBE_INPUT=  ,
    RUNOUT_SENSOR= ,

    E_HEATER=   , E_TEMPERATURE=   ,
    BED_HEATER= , BED_TEMPERATURE= ,

    PART_FAN=      , E_FAN= ,
    PART_FAN_TACHO , E_FAN_TACHO ,

    CONTROLLER_FAN=        ,
    EXHAUST_FAN=           ,
    FILTER_FAN=            ,
    HOST_CONTROLLER_FAN=   ,

    CHAMBER_TEMPERATURE= ,
    ELECTRICAL_CABINET_TEMPERATURE= ,

    LIGHT_OUTPUT=    ,
    LIGHT_NEOPIXEL=  ,
    STATUS_NEOPIXEL= ,

    SERVO_PIN= ,


#--------------------------------------------#
#### Mellow SHT36 v3.x MCU definition ########
#--------------------------------------------#

[mcu toolhead]
##--------------------------------------------------------------------
canbus_uuid: change-me-to-the-correct-canbus-id
##--------------------------------------------------------------------

# If you want to override the wiring of the Mellow SHT, keep in mind that this
# board is defined using the "toolhead" name. So you should use "pin: toolhead:PIN_NAME"
# in your own overrides.cfg files.

[include config/mcu_definitions/toolhead/Mellow_SHT36_v3.x.cfg] # Do not remove this line
[board_pins sht_mcu]
mcu: toolhead
aliases:
    E_STEP=MCU_EXT_STEP , E_DIR=MCU_EXT_DIR , E_ENABLE=MCU_EXT_EN , E_TMCUART=MCU_EXT_UART ,

    X_STOP=MCU_LIMIT_0 , Y_STOP=MCU_LIMIT_1 ,
    PROBE_INPUT=MCU_PROBE_1   ,
    TOOLHEAD_SENSOR=MCU_PROBE_2 ,

    E_HEATER=MCU_HE0 , E_TEMPERATURE=MCU_TH0 ,

    PART_FAN=MCU_FAN0 , E_FAN=MCU_FAN1 ,

    STATUS_NEOPIXEL=MCU_RGBLED ,

    LIS2DW=MCU_LIS2DW_CS ,
    SCK=MCU_SW_SCK , MISO=MCU_SW_MISO , MOSI=MCU_SW_MOSI ,


#----------------------------------------#
#    Mellow SHT36 v3.x pins remapping    #
#----------------------------------------#

# These pins overrides are automatically added when you select a CANbus
# toolhead MCU during the installation process. They should provide a
# good base to work with. Feel free to adapt to your board if needed!

[extruder]
step_pin: toolhead:E_STEP
dir_pin: toolhead:E_DIR
enable_pin: !toolhead:E_ENABLE
heater_pin: toolhead:E_HEATER
sensor_pin: toolhead:E_TEMPERATURE

[probe]
pin: ^toolhead:PROBE_INPUT

[fan]
pin: toolhead:PART_FAN

[heater_fan hotend_fan]
pin: toolhead:E_FAN

## Uncomment the following line if not using sensorless homing
## and having the X endstop plugged to the toolhead MCU
# [stepper_x]
# endstop_pin: ^toolhead:X_STOP

[neopixel status_leds]
pin: toolhead:STATUS_NEOPIXEL

[tmc2209 extruder]
uart_pin: toolhead:E_TMCUART

